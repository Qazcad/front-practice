<div class="todo-container">
  <h2>📋 Мои задачи</h2>

  <!-- Форма добавления (без изменений) -->
  <div class="add-task">
    <input
      [(ngModel)]="newTaskTitle"
      type="text"
      placeholder="Что нужно сделать?"
      (keyup.enter)="addTask()"
      class="task-input"
    >
    <button
      (click)="addTask()"
      class="add-btn"
      [disabled]="!newTaskTitle.trim()"
    >
      Добавить
    </button>
  </div>

  <!-- Фильтры (обновляем счетчики) -->
  <div class="filters">
    <button
      [class.active]="todoService.getCurrentFilter() === 'all'"
      (click)="setFilter('all')"
    >
      Все ({{ todoService.getTasks().length }})
    </button>
    <button
      [class.active]="todoService.getCurrentFilter() === 'active'"
      (click)="setFilter('active')"
    >
      Активные ({{ todoService.remainingCount() }})
    </button>
    <button
      [class.active]="todoService.getCurrentFilter() === 'completed'"
      (click)="setFilter('completed')"
    >
      Выполненные ({{ todoService.getTasks().length - todoService.remainingCount() }})
    </button>
  </div>

  <!-- Список задач (без изменений) -->
  <div class="todo-list">
    <app-todo-item
      *ngFor="let task of todoService.filteredTasks()"
      [task]="task"
      (deleteID)="deleteTask($event)"
      (completeID)="completeTask($event)"
    ></app-todo-item>

    <div *ngIf="todoService.filteredTasks().length === 0" class="empty-state">
      ✨ Задач нет
    </div>
  </div>

  <!-- Действия (обновляем условие) -->
  <div class="actions" *ngIf="todoService.getTasks().length > 0">
    <span class="remaining">
      Осталось: {{ todoService.remainingCount() }}
    </span>
    <button
      *ngIf="todoService.getTasks().length > todoService.remainingCount()"
      (click)="clearCompleted()"
      class="clear-btn"
    >
      🗑 Очистить выполненные
    </button>
  </div>
</div>
