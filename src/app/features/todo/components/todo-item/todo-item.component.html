<div class="todo-item" [class.completed]="task.completed">
  <span class="task-title">{{ task.title }}</span>
  <div class="actions">
    <button
      *ngIf="!task.completed"
      (click)="onCompleted()"
      class="complete-btn"
      title="Выполнить"
    >
      ✓
    </button>
    <button
      (click)="onDelete()"
      class="delete-btn"
      title="Удалить"
    >
      ×
    </button>
  </div>
</div>
